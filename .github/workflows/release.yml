name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write  # required by SignPath

jobs:
  build:
    runs-on: windows-latest
    name: Build RAMKeeper (MSVC, static)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Configure CMake
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -S .

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build --config Release

      - name: Show binary info
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          for %%F in (build\RAMKeeper.exe) do echo Size: %%~zF bytes
          dumpbin /dependents build\RAMKeeper.exe

      # Upload unsigned EXE so SignPath can fetch it
      - name: Upload unsigned artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: RAMKeeper-unsigned
          path: build\RAMKeeper.exe
          if-no-files-found: error

      # ── CODE SIGNING via SignPath.io (free OSS program) ──────────────────
      # Setup: https://signpath.io/open-source-software-program
      # Add these GitHub Secrets:
      #   SIGNPATH_API_TOKEN       — from SignPath dashboard → CI User API token
      #   SIGNPATH_ORGANIZATION_ID — from SignPath dashboard → Settings → General
      - name: Sign EXE (SignPath.io)
        if: startsWith(github.ref, 'refs/tags/')
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token:                  '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id:            '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug:               'RAMKeeper'
          signing-policy-slug:        'release-signing'
          artifact-configuration-slug: 'exe-signing'
          github-artifact-id:         '${{ steps.upload-unsigned.outputs.artifact-id }}'
          wait-for-completion:        true
          output-artifact-directory:  'signed'

      # Replace unsigned EXE with signed one (tag builds only)
      - name: Use signed EXE
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          if (Test-Path "signed\RAMKeeper.exe") {
            Copy-Item "signed\RAMKeeper.exe" "build\RAMKeeper.exe" -Force
            Write-Host "Using signed EXE"
          } else {
            Write-Host "::warning::Signed artifact not found — using unsigned EXE"
          }

      - name: Package ZIP (signed EXE inside)
        shell: pwsh
        run: Compress-Archive -Path build\RAMKeeper.exe -DestinationPath build\RAMKeeper.zip -Force

      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: RAMKeeper
          path: |
            build\RAMKeeper.exe
            build\RAMKeeper.zip
          if-no-files-found: error

      - name: Create GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build\RAMKeeper.exe
            build\RAMKeeper.zip
          name: "RAMKeeper ${{ github.ref_name }}"
          body: |
            ## RAMKeeper ${{ github.ref_name }}

            ### Download
            **[RAMKeeper.zip](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/RAMKeeper.zip)** — extract and run (recommended)
            **[RAMKeeper.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/RAMKeeper.exe)** — direct download (code-signed)

            Run as **Administrator** → tray icon appears → right-click for menu.

            ### Code Signing
            This release is code-signed by the [SignPath Foundation](https://signpath.org), a non-profit organization that provides free code signing for open-source software.

            ### If Windows blocks the download
            ```powershell
            Unblock-File .\RAMKeeper.exe
            ```

            ### Requirements
            - Windows 7+ (x64)
            - Administrator privileges (for standby list purge)
            - No runtime dependencies — static binary

            ### Hotkey
            `Ctrl+Alt+R` — clean RAM instantly from anywhere.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
