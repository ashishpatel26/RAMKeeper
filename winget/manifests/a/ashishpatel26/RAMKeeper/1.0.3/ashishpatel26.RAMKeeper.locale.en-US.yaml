ShortDescription: Lightweight Windows RAM cleaner — 149KB static binary, purges standby list, no runtime deps
Description: |-
  RAMKeeper is a lightweight Windows RAM cleaner that purges the standby list to free up memory.
  It ships as a single 149KB static binary with no runtime dependencies. The app runs in the
  system tray with Settings dialog, Ctrl+Alt+R hotkey, auto-clean triggers, and persistent config.
